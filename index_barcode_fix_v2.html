            async renderAlerts() {
                const items = await this.getAllItems();

                const expired = [];
                const warning30 = [];
                const lowStock = [];

                items.forEach(item => {
                    const expiryStatus = this.getExpiryStatus(item.expiry);
                    if (expiryStatus.status === 'expired') {
                        expired.push(item);
                    } else if (expiryStatus.status === 'warning') {
                        warning30.push(item);
                    }

                    if (item.stock <= 2) {
                        lowStock.push(item);
                    }
                });

                const statsContainer = document.getElementById('alert-stats');
                statsContainer.innerHTML = `
                    <div class="stat-card" style="background: linear-gradient(135deg, #dc2626, #b91c1c);">
                        <div class="stat-value">${expired.length}</div>
                        <div class="stat-label">期限切れ品目</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                        <div class="stat-value">${warning30.length}</div>
                        <div class="stat-label">30日以内期限</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                        <div class="stat-value">${lowStock.length}</div>
                        <div class="stat-label">在庫少品目</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
                        <div class="stat-value">${items.length}</div>
                        <div class="stat-label">総品目数</div>
                    </div>
                `;

                const alertContainer = document.getElementById('alert-content');
                let html = '';

                if (expired.length > 0) {
                    html += '<h3 style="margin: 16px 0 8px 0; font-size: 16px;">期限切れ品目</h3>';
                    expired.forEach(item => {
                        html += `
                            <div class="alert-item expired">
                                <div class="alert-item-name">${item.name}</div>
                                <div class="alert-item-detail">メーカー: ${item.maker} | 在庫: ${item.stock}</div>
                            </div>
                        `;
                    });
                }

                if (warning30.length > 0) {
                    html += '<h3 style="margin: 16px 0 8px 0; font-size: 16px;">30日以内期限</h3>';
                    warning30.forEach(item => {
                        html += `
                            <div class="alert-item warning">
                                <div class="alert-item-name">${item.name}</div>
                                <div class="alert-item-detail">メーカー: ${item.maker} | 在庫: ${item.stock}</div>
                            </div>
                        `;
                    });
                }

                if (lowStock.length > 0) {
                    html += '<h3 style="margin: 16px 0 8px 0; font-size: 16px;">在庫少品目（≤2）</h3>';
                    lowStock.forEach(item => {
                        const expiryStatus = this.getExpiryStatus(item.expiry);
                        html += `
                            <div class="alert-item low-stock">
                                <div class="alert-item-name">${item.name}</div>
                                <div class="alert-item-detail">メーカー: ${item.maker} | 在庫: ${item.stock} | 期限: ${expiryStatus.text}</div>
                            </div>
                        `;
                    });
                }

                if (html === '') {
                    html = '<div class="empty-state"><div class="empty-state-icon">✓</div><p>すべて良好です</p></div>';
                }

                alertContainer.innerHTML = html;
            },

            // === In/Out Barcode Scanner ===
            toggleInoutScanner() {
                if (!this.inoutScannerActive) {
                    this.startInoutScanner();
                } else {
                    this.stopInoutScanner();
                }
            },

            startInoutScanner() {
                if (this.inoutScannerActive) return;
                this.inoutScannerActive = true;
                const btn = document.getElementById('btn-inout-scan');
                btn.textContent = '📷 カメラを停止';
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-danger');

                const startWith = (constraints) => {
                    if (this.inoutScanner) {
                        try { this.inoutScanner.reset(); } catch(e) {}
                        this.inoutScanner = null;
                    }
                    const video = this._setupScannerContainer('inout-qr-reader');
                    if (!video) return Promise.reject(new Error('no container'));
                    this.inoutScanner = this._createZXingReader(this.scanMode);
                    return this.inoutScanner.decodeFromConstraints(constraints, video, (result) => {
                        if (result && this.inoutScannerActive) {
                            this.handleInoutScanResult(result.getText());
                        }
                    });
                };

                startWith(this._getCameraConstraints())
                .catch((err) => {
                    console.warn('Inout camera high-res failed, trying basic...', err);
                    return startWith({ video: { facingMode: 'environment' } });
                })
                .catch(() => {
                    alert('カメラへのアクセスに失敗しました。\nブラウザのカメラ許可設定をご確認ください。');
                    this.inoutScannerActive = false;
                    btn.textContent = '📷 カメラで読取';
                    btn.classList.add('btn-secondary');
                    btn.classList.remove('btn-danger');
                });
            },

            stopInoutScanner() {
                return new Promise((resolve) => {
                    if (this.inoutScanner) {
                        try { this.inoutScanner.reset(); } catch(e) {}
                        this.inoutScanner = null;
                    }
                    this.inoutScannerActive = false;
                    const btn = document.getElementById('btn-inout-scan');
                    if (btn) {
                        btn.textContent = '📷 カメラで読取';
                        btn.classList.add('btn-secondary');
                        btn.classList.remove('btn-danger');
                    }
                    const container = document.getElementById('inout-qr-reader');
                    if (container) container.innerHTML = '';
                    resolve();
                });
            },

            async handleInoutScanResult(barcode) {
                this.stopInoutScanner();
                document.getElementById('inout-barcode-input').value = barcode;
                await this.handleInoutBarcodeLookup();
            },

            async handleInoutBarcodeLookup() {
                const raw = document.getElementById('inout-barcode-input').value.trim();
                if (!raw) return;

                const parsed = this.detectAndParseBarcode(raw);
                const searchKeys = parsed.type === 'gs1' && parsed.data.gtinVariants
                    ? parsed.data.gtinVariants
                    : [raw];

                let item = null;
                for (const key of searchKeys) {
                    item = await this.getItemByBarcode(key);
                    if (!item) item = await this.getItemByCode(key);
                    if (item) break;
                }

                const msgContainer = document.getElementById('inout-barcode-message');
                // デバッグパネル（RAWバーコード）
                const inoutDebugHtml = `<details style="margin-bottom:6px;font-size:11px;">
                    <summary style="cursor:pointer;color:var(--text-light);user-select:none;">🔍 RAW（デバッグ）</summary>
                    <div style="margin-top:4px;padding:6px;background:#f8f8f8;border-radius:4px;word-break:break-all;font-family:monospace;font-size:11px;line-height:1.6;">
                        <div><b>長さ:</b> ${raw.length}文字</div>
                        <div><b>内容:</b> ${this._hexDump(raw)}</div>
                        <div><b>種別:</b> ${parsed.type === 'gs1' ? 'GS1解析済' : '平文'}</div>
                    </div>
                </details>`;
                if (item) {
                    const gs1Label = parsed.type === 'gs1'
                        ? ` <span class="badge badge-info" style="margin-left:6px;">GS1解析済</span>` : '';
                    msgContainer.innerHTML = inoutDebugHtml + `<div class="badge badge-success" style="display:inline-block;">✓ ${item.name} を選択${gs1Label}</div>`;

                    this.selectedItem = item;
                    this.lastGS1Data = parsed.type === 'gs1' ? parsed.data : null;

                    document.getElementById('inout-item-search').value = item.name;
                    document.getElementById('inout-item-suggestions').innerHTML = '';
                    this.displayInoutForm();

                    // GS1データで使用期限・ロット番号を自動入力
                    if (parsed.type === 'gs1' && parsed.data) {
                        const d = parsed.data;
                        if (d.expiryInput) {
                            document.getElementById('inout-expiry-date').value = d.expiryInput;
                        }
                        if (d.lot) {
                            document.getElementById('inout-lot-number').value = d.lot;
                        }
                    }
                } else {
                    const gs1Info = parsed.type === 'gs1' ? parsed.data : {};
                    msgContainer.innerHTML = inoutDebugHtml + `
                        <div style="margin-top:8px;">
                            <div class="badge badge-danger" style="display:inline-block;">該当する物品が見つかりません</div>
                            ${parsed.type === 'gs1' ? `<div style="font-size:12px;color:var(--text-light);margin-top:4px;">GTIN: ${gs1Info.gtin || raw}</div>` : ''}
                            <br>
                            <button class="btn btn-success" style="margin-top:8px;" onclick="app.openNewItemModalWithGS1(${JSON.stringify(gs1Info).replace(/"/g, '&quot;')})">＋ この物品を新規登録</button>
                        </div>`;
                }
            },

            // === New Item Registration ===
            async quickInstockWithGS1(itemId, gs1Data) {
                this.closeModal();
                this.switchTab('inout');
                this.setInoutMode('in');
                const req = this.db.transaction(['items']).objectStore('items').get(itemId);
                req.onsuccess = () => {
                    this.selectedItem = req.result;
                    this.displayInoutForm();
                    // GS1データを自動入力
                    if (gs1Data && gs1Data.expiryInput) {
                        document.getElementById('inout-expiry-date').value = gs1Data.expiryInput;
                    }
                    if (gs1Data && gs1Data.lot) {
                        document.getElementById('inout-lot-number').value = gs1Data.lot;
                    }
                };
            },

            async quickOutstockWithGS1(itemId, gs1Data) {
                this.closeModal();
                this.switchTab('inout');
                this.setInoutMode('out');
                const req = this.db.transaction(['items']).objectStore('items').get(itemId);
                req.onsuccess = () => {
                    this.selectedItem = req.result;
                    this.displayInoutForm();
                };
            },

            openNewItemModal() {
                document.getElementById('new-item-form').reset();
                document.getElementById('new-item-modal').classList.add('active');
            },

            openNewItemModalWithBarcode(barcode) {
                document.getElementById('new-item-form').reset();
                document.getElementById('new-item-barcode').value = barcode;
                document.getElementById('new-item-modal').classList.add('active');
            },

            openNewItemModalWithGS1(gs1Data) {
                document.getElementById('new-item-form').reset();
                if (gs1Data && gs1Data.gtinVariants && gs1Data.gtinVariants.length > 0) {
                    document.getElementById('new-item-barcode').value = gs1Data.gtinVariants[0];
                }
                if (gs1Data && gs1Data.expiryInput) {
                    document.getElementById('new-item-expiry').value = gs1Data.expiryInput;
                }
                document.getElementById('new-item-modal').classList.add('active');
            },

            closeNewItemModal() {
                if (this.newItemScannerActive) {
                    this.stopNewItemScanner();
                }
                document.getElementById('new-item-modal').classList.remove('active');
            },

            toggleNewItemScanner() {
                if (!this.newItemScannerActive) {
                    this.startNewItemScanner();
                } else {
                    this.stopNewItemScanner();
                }
            },

            startNewItemScanner() {
                if (this.newItemScannerActive) return;
                this.newItemScannerActive = true;
                const btn = document.getElementById('btn-scan-new-item-barcode');
                btn.textContent = '停止';
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-danger');

                const startWith = (constraints) => {
                    if (this.newItemScanner) {
                        try { this.newItemScanner.reset(); } catch(e) {}
                        this.newItemScanner = null;
                    }
                    const video = this._setupScannerContainer('new-item-qr-reader');
                    if (!video) return Promise.reject(new Error('no container'));
                    this.newItemScanner = this._createZXingReader(this.scanMode);
                    return this.newItemScanner.decodeFromConstraints(constraints, video, (result) => {
                        if (result && this.newItemScannerActive) {
                            const decodedText = result.getText();
                            const parsed = this.detectAndParseBarcode(decodedText);
                            const barcodeVal = (parsed.type === 'gs1' && parsed.data.gtinVariants)
                                ? parsed.data.gtinVariants[0] : decodedText;
                            document.getElementById('new-item-barcode').value = barcodeVal;
                            if (parsed.type === 'gs1' && parsed.data.expiryInput) {
                                document.getElementById('new-item-expiry').value = parsed.data.expiryInput;
                            }
                            this.stopNewItemScanner();
                        }
                    });
                };

                startWith(this._getCameraConstraints())
                .catch((err) => {
                    console.warn('NewItem camera high-res failed, trying basic...', err);
                    return startWith({ video: { facingMode: 'environment' } });
                })
                .catch(() => {
                    alert('カメラへのアクセスに失敗しました。\nブラウザのカメラ許可設定をご確認ください。');
                    this.stopNewItemScanner();
                });
            },

            stopNewItemScanner() {
                return new Promise((resolve) => {
                    if (this.newItemScanner) {
                        try { this.newItemScanner.reset(); } catch(e) {}
                        this.newItemScanner = null;
                    }
                    this.newItemScannerActive = false;
                    const btn = document.getElementById('btn-scan-new-item-barcode');
                    if (btn) {
                        btn.textContent = '📷 読取';
                        btn.classList.add('btn-secondary');
                        btn.classList.remove('btn-danger');
                    }
                    const container = document.getElementById('new-item-qr-reader');
                    if (container) container.innerHTML = '';
                    resolve();
                });
            },

            async submitNewItem() {
                const code = document.getElementById('new-item-code').value.trim();
                const barcode = document.getElementById('new-item-barcode').value.trim();
                const maker = document.getElementById('new-item-maker').value.trim();
                const name = document.getElementById('new-item-name').value.trim();
                const spec = document.getElementById('new-item-spec').value.trim();
                const stock = parseInt(document.getElementById('new-item-stock').value) || 0;
                const expiryInput = document.getElementById('new-item-expiry').value;

                if (!code || !maker || !name) {
                    alert('コード、メーカー、物品名は必須です');
                    return;
                }

                // Check for duplicate code
                const existingItem = await this.getItemByCode(code);
                if (existingItem) {
                    alert('このコードは既に登録されています');
                    return;
                }

                // Convert date to YYYYMMDD format
                let expiry = '';
                if (expiryInput) {
                    expiry = expiryInput.replace(/-/g, '');
                }

                // Get next available ID
                const allItems = await this.getAllItems();
                const maxId = allItems.reduce((max, item) => Math.max(max, item.id), 0);
                const newId = maxId + 1;

                return new Promise((resolve) => {
                    const transaction = this.db.transaction(['items'], 'readwrite');
                    const store = transaction.objectStore('items');
                    store.add({
                        id: newId,
                        code: code,
                        barcode: barcode || '',
                        maker: maker,
                        name: name,
                        spec: spec,
                        stock: stock,
                        expiry: expiry
                    });

                    transaction.oncomplete = () => {
                        this.closeNewItemModal();
                        alert(`「${name}」を登録しました`);
                        this.renderInventory();
                        this.renderAlerts();
                        resolve();
                    };

                    transaction.onerror = () => {
                        alert('登録に失敗しました: ' + transaction.error);
                        resolve();
                    };
                });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => app.init());
        } else {
            app.init();
        }
    </script>
</body>
</html>
