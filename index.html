<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Laboratory Inventory Management System">
    <meta name="theme-color" content="#1555c8">
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="在庫管理">
    <!-- Prevent auto-detection of phone numbers -->
    <meta name="format-detection" content="telephone=no">
    <title>在庫管理システム</title>

    <style>
        :root {
            --primary: #1555c8;
            --primary-dark: #0e429e;
            --primary-light: #eaf0fd;
            --secondary: #576778;
            --border: #d8e2ee;
            --bg: #f0f4f9;
            --surface: #ffffff;
            --surface2: #f7f9fc;
            --text: #18222e;
            --text2: #576778;
            --green: #0a9e6c;
            --green-bg: #e5f7ef;
            --amber: #b86d00;
            --amber-bg: #fef3d0;
            --red: #c72020;
            --red-bg: #fde8e8;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Improve touch responsiveness on mobile */
        button, .nav-item, .btn, [onclick] {
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
        }

        .app-header {
            background: var(--primary);
            color: var(--surface);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            box-shadow: var(--shadow);
            text-align: center;
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .app-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .tab-content {
            display: none;
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            height: calc(70px + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            cursor: pointer;
            color: var(--text2);
            border: none;
            background: none;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary);
            border-top: 3px solid var(--primary);
            margin-top: -1px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .summary-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--surface) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }

        .summary-card.warning {
            background: linear-gradient(135deg, var(--amber-bg) 0%, var(--surface) 100%);
        }

        .summary-card.danger {
            background: linear-gradient(135deg, var(--red-bg) 0%, var(--surface) 100%);
        }

        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .summary-card.warning .summary-value {
            color: var(--amber);
        }

        .summary-card.danger .summary-value {
            color: var(--red);
        }

        .summary-label {
            font-size: 12px;
            color: var(--text2);
        }

        .btn {
            display: inline-block;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--surface);
        }

        .btn-primary:active {
            background-color: var(--primary-dark);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--surface);
        }

        .btn-success {
            background-color: var(--green);
            color: var(--surface);
        }

        .btn-danger {
            background-color: var(--red);
            color: var(--surface);
        }

        .btn-block {
            display: block;
            width: 100%;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 16px;
        }

        .form-input.search-input {
            padding-left: 36px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--surface);
            border-color: var(--primary);
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .item-card:active {
            background: var(--primary-light);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-detail {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .item-stock {
            text-align: right;
            margin-left: 8px;
        }

        .stock-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .item-card.stock-low .stock-number {
            color: var(--red);
        }

        .item-card.stock-warning .stock-number {
            color: var(--amber);
        }

        .expiry-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .expiry-status.expired {
            background: var(--red-bg);
            color: var(--red);
        }

        .expiry-status.expiring-soon {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .expiry-status.warning {
            background: #d1ecf1;
            color: #0c5460;
        }

        .expiry-status.ok {
            background: var(--green-bg);
            color: var(--green);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
        }

        .activity-item.out {
            border-left-color: var(--red);
        }

        .activity-icon {
            font-size: 24px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .activity-item.out .activity-icon {
            background: var(--red-bg);
        }

        .activity-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .activity-detail {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 10px;
            color: #999;
        }

        .scanner-container {
            background: var(--surface);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        #scannerViewport {
            position: relative;
            background: #0a0a0a;
            overflow: hidden;
            aspect-ratio: 3/4;
            max-height: 50vh;
        }

        #scannerViewport video {
            width: 100%; height: 100%;
            display: block;
            object-fit: cover;
            background: #000;
            /* Android Chrome: prevent video from going fullscreen */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        #scannerViewport canvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 30%;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.38);
            border-radius: 4px;
        }

        .scan-frame::before, .scan-frame::after,
        .scan-frame-b::before, .scan-frame-b::after {
            content: ''; position: absolute;
            width: 24px; height: 24px;
            border-color: #34d399; border-style: solid;
        }

        .scan-frame::before  { top:-2px; left:-2px; border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
        .scan-frame::after   { top:-2px; right:-2px; border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
        .scan-frame-b::before { bottom:-2px; left:-2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
        .scan-frame-b::after  { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }

        .scan-line-anim {
            position: absolute;
            left: 4px; right: 4px; height: 2px;
            background: linear-gradient(90deg, transparent, #34d399 30%, #34d399 70%, transparent);
            animation: scanLineMove 2s linear infinite;
        }

        @keyframes scanLineMove {
            0%   { top: 8%;  opacity: 0; }
            8%   {           opacity: 1; }
            92%  {           opacity: 1; }
            100% { top: 92%; opacity: 0; }
        }

        .cam-status-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
            display: flex; align-items: center; gap: 8px;
        }

        .cam-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: #666; flex-shrink: 0;
            transition: background .3s, box-shadow .3s;
        }

        .cam-dot.active {
            background: #4ade80;
            box-shadow: 0 0 7px #4ade80;
            animation: camBlink 1.5s infinite;
        }

        .cam-dot.error { background: #f87171; }

        @keyframes camBlink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .cam-status-text { color: #fff; font-size: 13px; font-weight: 500; }

        .scanner-controls {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .scanner-controls button {
            flex: 1;
            min-width: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: flex-end;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 16px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text2);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text2);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 13px;
        }

        .alert {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .alert-success {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .alert-error {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .table th {
            background: var(--surface2);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .table tr:hover {
            background: var(--primary-light);
        }

        .badge-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: var(--primary);
            color: var(--surface);
        }

        .badge-pill.danger {
            background: var(--red);
        }

        .badge-pill.success {
            background: var(--green);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .quick-action-btn {
            padding: 16px;
            text-align: center;
            border: none;
            background: var(--surface);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .quick-action-btn:active {
            background: var(--primary-light);
        }

        .quick-action-icon {
            font-size: 32px;
        }

        .quick-action-label {
            font-size: 13px;
            font-weight: 600;
        }

        .scanner-input {
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid var(--primary) !important;
        }

        .matched-item {
            background: var(--surface);
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--primary);
        }

        .matched-item-field {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .matched-item-field:last-child {
            border-bottom: none;
        }

        .matched-item-label {
            font-weight: 600;
            color: var(--text2);
        }

        .matched-item-value {
            font-weight: 600;
        }

        .history-filter-group {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .history-filter-group .form-group {
            margin-bottom: 12px;
        }

        .date-range-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .date-range-group input {
            flex: 1;
        }

        @media (min-width: 768px) {
            .summary-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /*
         * Custom styles for the 入出庫登録フォーム (transaction form).
         * These rules provide a flexible two‑column layout on larger screens
         * and stack the sections vertically on small screens. Each panel
         * includes its own card styling consistent with the rest of the UI.
         */
        .txn-container {
            margin-top: 16px;
        }
        .txn-flex {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        @media (min-width: 600px) {
            .txn-flex {
                flex-direction: row;
            }
        }
        .item-summary-card,
        .txn-fields-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            padding: 16px;
        }
        .item-summary-card {
            flex: 1;
        }
        .txn-fields-card {
            flex: 2;
        }
        .item-summary-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .txn-type-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .txn-type-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        /* When JS applies inline styles via setTransactionType, they override these defaults.
           The following classes can be toggled in future to reflect active state visually. */
        .txn-type-btn.active {
            background: var(--primary);
            color: var(--surface);
        }
        .txn-type-btn.active-out {
            background: var(--red);
            border-color: var(--red);
            color: var(--surface);
        }
        .txn-fields {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        @media (min-width: 600px) {
            .txn-fields {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .txn-action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .txn-action-buttons .btn {
            /* Ensure both buttons share equal width regardless of their content */
            flex: 1 1 0;
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>在庫管理システム</h1>
    </div>

    <div class="app-container">
        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <div class="quick-actions">
                <button class="quick-action-btn" onclick="app.switchTab('inventory')">
                    <span class="quick-action-icon">📋</span>
                    <span class="quick-action-label">在庫一覧</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('scanner')">
                    <span class="quick-action-icon">📱</span>
                    <span class="quick-action-label">入出庫登録</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('expiry')">
                    <span class="quick-action-icon">⏰</span>
                    <span class="quick-action-label">期限管理</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('history')">
                    <span class="quick-action-icon">📊</span>
                    <span class="quick-action-label">入出庫履歴</span>
                </button>
            </div>

            <div class="card">
                <h2 class="card-title">概要</h2>
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-value" id="totalItems">-</div>
                        <div class="summary-label">登録品目</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-value" id="inStock">-</div>
                        <div class="summary-label">在庫あり</div>
                    </div>
                    <div class="summary-card warning">
                        <div class="summary-value" id="expiringSoon">-</div>
                        <div class="summary-label">期限切迫</div>
                    </div>
                    <div class="summary-card danger">
                        <div class="summary-value" id="expired">-</div>
                        <div class="summary-label">期限切れ</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">最近の入出庫</h2>
                <div id="recentActivity" class="activity-list"></div>
            </div>

            <div class="card">
                <button class="btn btn-primary btn-block" onclick="document.getElementById('importModal').classList.add('active')">
                    📥 Excelファイルをインポート
                </button>
                <button class="btn btn-secondary btn-block" onclick="app.exportData()">
                    📤 データをエクスポート

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@ericblade/quagga2@1.7.3/dist/quagga.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>

    <script>
        class InventoryApp {
            constructor() {
                this.db = null;
                this.items = [];
                this.history = [];
                this.currentTab = 'dashboard';
                this.currentTransactionType = '入庫';
                this.currentScanItem = null;
                this.scannerActive = false;
                this.init();
            }

            async init() {
                await this.initDB();
                this.setupEventListeners();
                await this.loadData();
                this.updateDashboard();
            }

            async initDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('InventoryDB', 1);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('items')) {
                            db.createObjectStore('items', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('history')) {
                            db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                });
            }

            setupEventListeners() {
                document.getElementById('inventorySearch').addEventListener('input', () => this.filterInventory());
                document.getElementById('inventorySortBy').addEventListener('change', () => this.filterInventory());
                
                document.querySelectorAll('#inventoryFilters .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#inventoryFilters .filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.filterInventory();
                    });
                });

                document.querySelectorAll('#expiryFilters .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#expiryFilters .filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.filterExpiry();
                    });
                });

                document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.manualLookup();
                    }
                });

                const today = new Date();
                const firstDay = new Date(today.getFullYear(), 0, 1);
                document.getElementById('historyDateFrom').valueAsDate = firstDay;
                document.getElementById('historyDateTo').valueAsDate = today;
            }

            switchTab(tabName) {
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

                document.getElementById(tabName).classList.add('active');
                document.querySelector(`[onclick="app.switchTab('${tabName}')"]`).classList.add('active');

                this.currentTab = tabName;

                if (tabName === 'inventory') this.filterInventory();
                else if (tabName === 'expiry') this.filterExpiry();
                else if (tabName === 'history') this.filterHistory();
            }

            async loadData() {
                const transaction = this.db.transaction(['items', 'history'], 'readonly');
                this.items = await this.getAll(transaction.objectStore('items'));
                this.history = await this.getAll(transaction.objectStore('history'));
            }

            getAll(objectStore) {
                return new Promise((resolve, reject) => {
                    const request = objectStore.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async saveItem(item) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['items'], 'readwrite');
                    const request = transaction.objectStore('items').put(item);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async saveHistory(entry) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['history'], 'readwrite');
                    const request = transaction.objectStore('history').add(entry);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async deleteAllItems() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['items'], 'readwrite');
                    const request = transaction.objectStore('items').clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            formatDate(yymmdd) {
                if (!yymmdd) return '';
                const str = String(yymmdd).padStart(6, '0');
                const yy = parseInt(str.substring(0, 2));
                const mm = parseInt(str.substring(2, 4));
                const dd = parseInt(str.substring(4, 6));

                if (mm < 1 || mm > 12 || dd < 1 || dd > 31) {
                    return `20${yy}年${mm}月`;
                }

                const year = 2000 + yy;
                const date = new Date(year, mm - 1, dd);
                return date.toLocaleDateString('ja-JP');
            }

            getExpiryStatus(yymmdd) {
                if (!yymmdd) return 'unknown';

                const str = String(yymmdd).padStart(6, '0');
                const yy = parseInt(str.substring(0, 2));
                const mm = parseInt(str.substring(2, 4));
                const dd = parseInt(str.substring(4, 6));

                if (mm < 1 || mm > 12) return 'unknown';

                const year = 2000 + yy;
                let expiryDate;

                if (dd < 1 || dd > 31) {
                    expiryDate = new Date(year, mm, 0);
                } else {
                    expiryDate = new Date(year, mm - 1, dd);
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                expiryDate.setHours(0, 0, 0, 0);

                const daysUntilExpiry = Math.floor((expiryDate - today) / (1000 * 60 * 60 * 24));

                if (daysUntilExpiry < 0) return 'expired';
                if (daysUntilExpiry <= 30) return 'expiring-soon';
                if (daysUntilExpiry <= 90) return 'warning';
                return 'ok';
            }

            getExpiryStatusLabel(status) {
                const labels = {
                    'expired': { text: '期限切れ', class: 'expired' },
                    'expiring-soon': { text: '30日以内', class: 'expiring-soon' },
                    'warning': { text: '90日以内', class: 'warning' },
                    'ok': { text: '正常', class: 'ok' },
                    'unknown': { text: '不明', class: 'ok' }
                };
                return labels[status] || labels['ok'];
            }

            updateDashboard() {
                const expired = this.items.filter(item => {
                    return this.getExpiryStatus(item['入庫後最新使用期限(日付)']) === 'expired';
                }).length;

                const expiringSoon = this.items.filter(item => {
                    return this.getExpiryStatus(item['入庫後最新使用期限(日付)']) === 'expiring-soon';
                }).length;

                const inStock = this.items.filter(item => item['在庫数'] > 0).length;

                document.getElementById('totalItems').textContent = this.items.length;
                document.getElementById('inStock').textContent = inStock;
                document.getElementById('expiringSoon').textContent = expiringSoon;
                document.getElementById('expired').textContent = expired;

                const recentActivity = this.history.slice(-10).reverse();
                const activityHtml = recentActivity.length > 0
                    ? recentActivity.map(entry => `
                        <div class="activity-item ${entry['入庫/出庫'] === '出庫' ? 'out' : ''}">
                            <div class="activity-icon">${entry['入庫/出庫'] === '出庫' ? '📤' : '📥'}</div>
                            <div class="activity-content">
                                <div class="activity-title">${entry['物品名']}</div>
                                <div class="activity-detail">数量: ${entry['数量']} | ${entry['入庫/出庫']}</div>
                                <div class="activity-detail">担当: ${entry['入出庫者'] || '未設定'}</div>
                                <div class="activity-time">${new Date(entry['入出庫日']).toLocaleString('ja-JP')}</div>
                            </div>
                        </div>
                    `).join('')
                    : '<div class="empty-state"><div class="empty-state-text">履歴がありません</div></div>';

                document.getElementById('recentActivity').innerHTML = activityHtml;
            }

            filterInventory() {
                const searchTerm = document.getElementById('inventorySearch').value.toLowerCase();
                const activeFilter = document.querySelector('#inventoryFilters .filter-btn.active').dataset.filter;
                const sortBy = document.getElementById('inventorySortBy').value;

                let filtered = this.items.filter(item => {
                    const matchesSearch = !searchTerm ||
                        item['物品名'].toLowerCase().includes(searchTerm) ||
                        item['メーカー'].toLowerCase().includes(searchTerm) ||
                        String(item['コード']).includes(searchTerm) ||
                        String(item['物品コード']).includes(searchTerm);

                    if (!matchesSearch) return false;

                    const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);

                    if (activeFilter === 'all') return true;
                    if (activeFilter === 'in-stock') return item['在庫数'] > 0;
                    if (activeFilter === 'expiring-30') return expiryStatus === 'expiring-soon';
                    if (activeFilter === 'expiring-90') return expiryStatus === 'warning' || expiryStatus === 'expiring-soon';

                    return true;
                });

                filtered.sort((a, b) => {
                    if (sortBy === 'name') return a['物品名'].localeCompare(b['物品名'], 'ja');
                    if (sortBy === 'stock') return b['在庫数'] - a['在庫数'];
                    if (sortBy === 'expiry') {
                        const aExp = a['入庫後最新使用期限(日付)'] || 999999;
                        const bExp = b['入庫後最新使用期限(日付)'] || 999999;
                        return aExp - bExp;
                    }
                    if (sortBy === 'code') return String(a['コード']).localeCompare(String(b['コード']));
                    return 0;
                });

                this.displayInventory(filtered);
            }

            displayInventory(items) {
                const html = items.length > 0
                    ? items.map(item => {
                        const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);
                        const statusLabel = this.getExpiryStatusLabel(expiryStatus);
                        const stockClass = item['在庫数'] === 0 ? 'stock-low' : item['在庫数'] < 5 ? 'stock-warning' : '';

                        const idx = this.items.indexOf(item);
                        return `
                            <div class="item-card ${stockClass}">
                                <div class="item-info">
                                    <div class="item-name">${item['物品名']}</div>
                                    <div class="item-detail">
                                        <small><strong>メーカー:</strong> ${item['メーカー'] || '―'}</small>
                                        &nbsp;<small><strong>規格:</strong> ${item['規格'] || '―'}</small>
                                    </div>
                                    <div class="item-detail">
                                        <small><strong>コード:</strong> ${item['コード']}</small>
                                        ${item['物品コード'] ? `<small style="margin-left:6px"><strong>物品:</strong> ${item['物品コード']}</small>` : ''}
                                    </div>
                                    <span class="expiry-status ${statusLabel.class}">${statusLabel.text}</span>
                                    <div class="item-detail" style="margin-top: 4px;">
                                        期限: ${this.formatDate(item['入庫後最新使用期限(日付)'])}
                                    </div>
                                </div>
                                <div class="item-stock" style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
                                    <div>
                                        <div class="stock-number">${item['在庫数']}</div>
                                        <div style="font-size: 12px; color: var(--text2); text-align:right;">個</div>
                                    </div>
                                    <button data-edit-idx="${idx}" class="edit-item-btn"
                                        style="font-size:11px;padding:4px 10px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;cursor:pointer;color:var(--text2);white-space:nowrap;">
                                        ✏️ 編集
                                    </button>
                                </div>
                            </div>

                    }).join('')
                    : `<div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-title">該当する品目がありません</div>
                        <div class="empty-state-text">別の条件で検索してみてください</div>
                    </div>`;

                document.getElementById('inventoryList').innerHTML = html;

                // Attach edit button handlers via event delegation
                document.getElementById('inventoryList').querySelectorAll('.edit-item-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.dataset.editIdx);
                        if (!isNaN(idx) && this.items[idx]) {
                            this.openNewItemModal(this.items[idx]);
                        }
                    });
                });
            }

            filterExpiry() {
                const activeFilter = document.querySelector('#expiryFilters .filter-btn.active').dataset.filter;

                let filtered = this.items.filter(item => {
                    if (item['在庫数'] === 0) return false;

                    const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);

                    if (activeFilter === 'all') return true;
                    if (activeFilter === 'expired') return expiryStatus === 'expired';
                    if (activeFilter === 'expiring-30') return expiryStatus === 'expiring-soon';
                    if (activeFilter === 'expiring-90') return expiryStatus === 'warning' || expiryStatus === 'expiring-soon';

                    return true;
                });

                filtered.sort((a, b) => {
                    const aExp = a['入庫後最新使用期限(日付)'] || 999999;
                    const bExp = b['入庫後最新使用期限(日付)'] || 999999;
                    return aExp - bExp;
                });

                this.displayExpiry(filtered);
            }

            displayExpiry(items) {
                const html = items.length > 0
                    ? items.map(item => {
                        const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);
                        const statusLabel = this.getExpiryStatusLabel(expiryStatus);

                        return `
                            <div class="item-card">
                                <div class="item-info">
                                    <div class="item-name">${item['物品名']}</div>
                                    <div class="item-detail">
                                        <small><strong>メーカー:</strong> ${item['メーカー']}</small>
                                        <small><strong>期限:</strong> ${this.formatDate(item['入庫後最新使用期限(日付)'])}</small>
                                    </div>
                                    <span class="expiry-status ${statusLabel.class}">${statusLabel.text}</span>
                                </div>
                                <div class="item-stock">
                                    <div class="stock-number">${item['在庫数']}</div>
                                    <div style="font-size: 12px; color: var(--text2);">個</div>
                                </div>
                            </div>
                        `;
                    }).join('')
                    : `<div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <div class="empty-state-title">期限切れ商品はありません</div>
                        <div class="empty-state-text">在庫が適切に管理されています</div>
                    </div>`;

                document.getElementById('expiryList').innerHTML = html;
            }

            processBarcodeInput(barcode) {
                if (!barcode) return;
                const bc = String(barcode).trim();
                // Match against コード, 物品コード (with/without leading zeros)
                const matched = this.items.find(item => {
                    const code = String(item['コード'] || '');
                    const productCode = String(item['物品コード'] || '');
                    return code === bc || productCode === bc ||
                        code.replace(/^0+/, '') === bc.replace(/^0+/, '') ||
                        productCode.replace(/^0+/, '') === bc.replace(/^0+/, '') ||
                        // GTIN-14 match: strip leading 0s from GTIN and compare
                        bc.includes(productCode.replace(/^0+/, '')) ||
                        productCode.includes(bc.replace(/^0+/, ''));
                });

                if (matched) {
                    this.currentScanItem = matched;
                    this.displayScanResult(matched);
                    document.getElementById('transactionForm').style.display = 'block';
                } else {
                    document.getElementById('scannerResult').innerHTML = `
                        <div class="card">
                            <div class="alert alert-error">
                                ⚠️ バーコード「${barcode}」に一致する品目が見つかりません
                            </div>
                        </div>
                    `;
                    document.getElementById('transactionForm').style.display = 'none';
                }
            }

            displayScanResult(item) {
                const expiryStr = this.formatDate(item['入庫後最新使用期限(日付)']);
                const html = `
                    <div style="font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; line-height:1.4;">
                        ${item['物品名']}
                    </div>
                    <div style="display:grid; grid-template-columns:4em 1fr; gap:4px 8px; font-size:13px;">
                        <span style="color:var(--text2); font-weight:600;">メーカー</span>
                        <span>${item['メーカー'] || '―'}</span>
                        <span style="color:var(--text2); font-weight:600;">規格</span>
                        <span>${item['規格'] || '―'}</span>
                        <span style="color:var(--text2); font-weight:600;">現在庫</span>
                        <span style="font-weight:700; color:var(--primary);">${item['在庫数']} 個</span>
                        <span style="color:var(--text2); font-weight:600;">使用期限</span>
                        <span>${expiryStr || '―'}</span>
                        <span style="color:var(--text2); font-weight:600;">コード</span>
                        <span style="font-family:monospace;">${item['コード']}</span>
                    </div>

                document.getElementById('matchedItemDisplay').innerHTML = html;
            }

            setTransactionType(type) {
                this.currentTransactionType = type;
                const inBtn = document.getElementById('inButton');
                const outBtn = document.getElementById('outButton');

                if (type === '入庫') {
                    inBtn.style.cssText  = 'flex:1; padding:14px; font-size:16px; font-weight:700; border:none; border-radius:10px; cursor:pointer; background:var(--primary); color:#fff;';
                    outBtn.style.cssText = 'flex:1; padding:14px; font-size:16px; font-weight:700; border:2px solid var(--border); border-radius:10px; cursor:pointer; background:var(--surface); color:var(--text);';
                } else {
                    inBtn.style.cssText  = 'flex:1; padding:14px; font-size:16px; font-weight:700; border:2px solid var(--border); border-radius:10px; cursor:pointer; background:var(--surface); color:var(--text);';
                    outBtn.style.cssText = 'flex:1; padding:14px; font-size:16px; font-weight:700; border:none; border-radius:10px; cursor:pointer; background:var(--red); color:#fff;';
