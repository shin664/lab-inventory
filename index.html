<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laboratory Inventory Management System">
    <meta name="theme-color" content="#1555c8">
    <title>在庫管理システム</title>

    <style>
        :root {
            --primary: #1555c8;
            --primary-dark: #0e429e;
            --primary-light: #eaf0fd;
            --secondary: #576778;
            --border: #d8e2ee;
            --bg: #f0f4f9;
            --surface: #ffffff;
            --surface2: #f7f9fc;
            --text: #18222e;
            --text2: #576778;
            --green: #0a9e6c;
            --green-bg: #e5f7ef;
            --amber: #b86d00;
            --amber-bg: #fef3d0;
            --red: #c72020;
            --red-bg: #fde8e8;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: 70px;
        }

        .app-header {
            background: var(--primary);
            color: var(--surface);
            padding: 12px 16px;
            box-shadow: var(--shadow);
            text-align: center;
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .app-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .tab-content {
            display: none;
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            height: 70px;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            cursor: pointer;
            color: var(--text2);
            border: none;
            background: none;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary);
            border-top: 3px solid var(--primary);
            margin-top: -1px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .summary-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--surface) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }

        .summary-card.warning {
            background: linear-gradient(135deg, var(--amber-bg) 0%, var(--surface) 100%);
        }

        .summary-card.danger {
            background: linear-gradient(135deg, var(--red-bg) 0%, var(--surface) 100%);
        }

        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .summary-card.warning .summary-value {
            color: var(--amber);
        }

        .summary-card.danger .summary-value {
            color: var(--red);
        }

        .summary-label {
            font-size: 12px;
            color: var(--text2);
        }

        .btn {
            display: inline-block;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--surface);
        }

        .btn-primary:active {
            background-color: var(--primary-dark);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--surface);
        }

        .btn-success {
            background-color: var(--green);
            color: var(--surface);
        }

        .btn-danger {
            background-color: var(--red);
            color: var(--surface);
        }

        .btn-block {
            display: block;
            width: 100%;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 16px;
        }

        .form-input.search-input {
            padding-left: 36px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--surface);
            border-color: var(--primary);
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .item-card:active {
            background: var(--primary-light);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-detail {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .item-stock {
            text-align: right;
            margin-left: 8px;
        }

        .stock-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .item-card.stock-low .stock-number {
            color: var(--red);
        }

        .item-card.stock-warning .stock-number {
            color: var(--amber);
        }

        .expiry-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .expiry-status.expired {
            background: var(--red-bg);
            color: var(--red);
        }

        .expiry-status.expiring-soon {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .expiry-status.warning {
            background: #d1ecf1;
            color: #0c5460;
        }

        .expiry-status.ok {
            background: var(--green-bg);
            color: var(--green);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
        }

        .activity-item.out {
            border-left-color: var(--red);
        }

        .activity-icon {
            font-size: 24px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .activity-item.out .activity-icon {
            background: var(--red-bg);
        }

        .activity-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .activity-detail {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 10px;
            color: #999;
        }

        .scanner-container {
            background: var(--surface);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
        }

        .scanner-controls {
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        .scanner-controls button {
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: flex-end;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 16px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text2);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text2);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 13px;
        }

        .alert {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .alert-success {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .alert-error {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .table th {
            background: var(--surface2);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .table tr:hover {
            background: var(--primary-light);
        }

        .badge-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: var(--primary);
            color: var(--surface);
        }

        .badge-pill.danger {
            background: var(--red);
        }

        .badge-pill.success {
            background: var(--green);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .quick-action-btn {
            padding: 16px;
            text-align: center;
            border: none;
            background: var(--surface);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .quick-action-btn:active {
            background: var(--primary-light);
        }

        .quick-action-icon {
            font-size: 32px;
        }

        .quick-action-label {
            font-size: 13px;
            font-weight: 600;
        }

        .scanner-input {
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid var(--primary) !important;
        }

        .matched-item {
            background: var(--surface);
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--primary);
        }

        .matched-item-field {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .matched-item-field:last-child {
            border-bottom: none;
        }

        .matched-item-label {
            font-weight: 600;
            color: var(--text2);
        }

        .matched-item-value {
            font-weight: 600;
        }

        .history-filter-group {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .history-filter-group .form-group {
            margin-bottom: 12px;
        }

        .date-range-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .date-range-group input {
            flex: 1;
        }

        @media (min-width: 768px) {
            .summary-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>在庫管理システム</h1>
    </div>

    <div class="app-container">
        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <div class="quick-actions">
                <button class="quick-action-btn" onclick="app.switchTab('inventory')">
                    <span class="quick-action-icon">📋</span>
                    <span class="quick-action-label">在庫一覧</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('scanner')">
                    <span class="quick-action-icon">📱</span>
                    <span class="quick-action-label">入出庫登録</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('expiry')">
                    <span class="quick-action-icon">⏰</span>
                    <span class="quick-action-label">期限管理</span>
                </button>
                <button class="quick-action-btn" onclick="app.switchTab('history')">
                    <span class="quick-action-icon">📊</span>
                    <span class="quick-action-label">入出庫履歴</span>
                </button>
            </div>

            <div class="card">
                <h2 class="card-title">概要</h2>
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-value" id="totalItems">-</div>
                        <div class="summary-label">登録品目</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-value" id="inStock">-</div>
                        <div class="summary-label">在庫あり</div>
                    </div>
                    <div class="summary-card warning">
                        <div class="summary-value" id="expiringSoon">-</div>
                        <div class="summary-label">期限切迫</div>
                    </div>
                    <div class="summary-card danger">
                        <div class="summary-value" id="expired">-</div>
                        <div class="summary-label">期限切れ</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">最近の入出庫</h2>
                <div id="recentActivity" class="activity-list"></div>
            </div>

            <div class="card">
                <button class="btn btn-primary btn-block" onclick="document.getElementById('importModal').classList.add('active')">
                    📥 Excelファイルをインポート
                </button>
                <button class="btn btn-secondary btn-block" onclick="app.exportData()">
                    📤 データをエクスポート
                </button>
            </div>
        </div>

        <!-- Inventory -->
        <div id="inventory" class="tab-content">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="form-input search-input" id="inventorySearch" placeholder="品目名、メーカー、コードで検索...">
            </div>

            <div class="filters" id="inventoryFilters">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="in-stock">在庫あり</button>
                <button class="filter-btn" data-filter="expiring-30">30日以内</button>
                <button class="filter-btn" data-filter="expiring-90">90日以内</button>
            </div>

            <div class="form-group">
                <label class="form-label">ソート</label>
                <select class="form-select" id="inventorySortBy">
                    <option value="name">品目名</option>
                    <option value="stock">在庫数</option>
                    <option value="expiry">使用期限</option>
                    <option value="code">コード</option>
                </select>
            </div>

            <div id="inventoryList" class="item-list"></div>
        </div>

        <!-- Scanner -->
        <div id="scanner" class="tab-content">
            <div class="card">
                <h2 class="card-title">バーコードスキャナー</h2>
                <div class="scanner-container" id="scannerContainer" style="display: none;">
                    <video id="video" playsinline></video>
                </div>
                <div class="scanner-controls">
                    <button class="btn btn-primary" onclick="app.startScanner()">📷 スキャン開始</button>
                    <button class="btn btn-secondary" onclick="app.stopScanner()">⏹️ 停止</button>
                </div>

                <input type="text" class="form-input scanner-input" id="barcodeInput" placeholder="バーコードを入力またはスキャン...">
            </div>

            <div id="scannerResult"></div>

            <div id="transactionForm" class="card" style="display: none;">
                <h2 class="card-title">入出庫登録</h2>

                <div class="form-group">
                    <label class="form-label">品目</label>
                    <div class="matched-item" id="matchedItemDisplay"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">入庫/出庫</label>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn" style="flex: 1; background: var(--primary); color: var(--surface);" id="inButton" onclick="app.setTransactionType('入庫')">📥 入庫</button>
                        <button class="btn" style="flex: 1; background: var(--surface); color: var(--text); border: 2px solid var(--red);" id="outButton" onclick="app.setTransactionType('出庫')">📤 出庫</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">担当者名</label>
                    <input type="text" class="form-input" id="transactionPerson" placeholder="担当者の名前を入力">
                </div>

                <div class="form-group">
                    <label class="form-label">数量</label>
                    <input type="number" class="form-input" id="transactionQuantity" placeholder="0" min="0">
                </div>

                <div class="form-group">
                    <label class="form-label">使用期限 (YYMMDD)</label>
                    <input type="text" class="form-input" id="transactionExpiry" placeholder="260228">
                </div>

                <div class="form-group">
                    <label class="form-label">ロット番号</label>
                    <input type="text" class="form-input" id="transactionLot" placeholder="ロット番号">
                </div>

                <div class="form-group">
                    <label class="form-label">コメント</label>
                    <textarea class="form-textarea" id="transactionComment" placeholder="追記があればここに入力..."></textarea>
                </div>

                <div class="form-group">
                    <button class="btn btn-success btn-block" onclick="app.submitTransaction()">✅ 登録</button>
                    <button class="btn btn-secondary btn-block" onclick="app.resetTransaction()">🔄 リセット</button>
                </div>
            </div>
        </div>

        <!-- Expiry -->
        <div id="expiry" class="tab-content">
            <div class="filters" id="expiryFilters" style="margin-bottom: 16px;">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="expired">期限切れ</button>
                <button class="filter-btn" data-filter="expiring-30">30日以内</button>
                <button class="filter-btn" data-filter="expiring-90">90日以内</button>
            </div>

            <div id="expiryList" class="item-list"></div>
        </div>

        <!-- History -->
        <div id="history" class="tab-content">
            <div class="history-filter-group">
                <div class="form-group">
                    <label class="form-label">期間</label>
                    <div class="date-range-group">
                        <input type="date" class="form-input" id="historyDateFrom">
                        <div style="padding: 0 8px; display: flex; align-items: center;">～</div>
                        <input type="date" class="form-input" id="historyDateTo">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">品目</label>
                    <input type="text" class="form-input" id="historyItemName" placeholder="品目名で検索...">
                </div>

                <div class="form-group">
                    <label class="form-label">種別</label>
                    <select class="form-select" id="historyType">
                        <option value="">すべて</option>
                        <option value="入庫">入庫</option>
                        <option value="出庫">出庫</option>
                    </select>
                </div>

                <div class="form-group">
                    <button class="btn btn-primary btn-block" onclick="app.filterHistory()">🔍 検索</button>
                    <button class="btn btn-secondary btn-block" onclick="app.exportHistory()">📥 CSVエクスポート</button>
                </div>
            </div>

            <div id="historyTable" style="overflow-x: auto;"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="app.switchTab('dashboard')">
            <span class="nav-icon">🏠</span>
        </button>
        <button class="nav-item" onclick="app.switchTab('inventory')">
            <span class="nav-icon">📋</span>
        </button>
        <button class="nav-item" onclick="app.switchTab('scanner')">
            <span class="nav-icon">📱</span>
        </button>
        <button class="nav-item" onclick="app.switchTab('expiry')">
            <span class="nav-icon">⏰</span>
        </button>
        <button class="nav-item" onclick="app.switchTab('history')">
            <span class="nav-icon">📊</span>
        </button>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Excelファイルをインポート</h2>
                <button class="close-btn" onclick="document.getElementById('importModal').classList.remove('active')">✕</button>
            </div>

            <div id="importAlert"></div>

            <div class="form-group">
                <label class="form-label">ファイルを選択</label>
                <input type="file" id="importFile" class="form-input" accept=".xlsx,.xls">
            </div>

            <button class="btn btn-primary btn-block" onclick="app.importData()">
                📥 インポート
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@ericblade/quagga2@1.7.3/dist/quagga.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>

    <script>
        class InventoryApp {
            constructor() {
                this.db = null;
                this.items = [];
                this.history = [];
                this.currentTab = 'dashboard';
                this.currentTransactionType = '入庫';
                this.currentScanItem = null;
                this.scannerActive = false;
                this.init();
            }

            async init() {
                await this.initDB();
                this.setupEventListeners();
                await this.loadData();
                this.updateDashboard();
            }

            async initDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('InventoryDB', 1);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('items')) {
                            db.createObjectStore('items', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('history')) {
                            db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                });
            }

            setupEventListeners() {
                document.getElementById('inventorySearch').addEventListener('input', () => this.filterInventory());
                document.getElementById('inventorySortBy').addEventListener('change', () => this.filterInventory());
                
                document.querySelectorAll('#inventoryFilters .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#inventoryFilters .filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.filterInventory();
                    });
                });

                document.querySelectorAll('#expiryFilters .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#expiryFilters .filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.filterExpiry();
                    });
                });

                document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.processBarcodeInput(e.target.value);
                        e.target.value = '';
                    }
                });

                const today = new Date();
                const firstDay = new Date(today.getFullYear(), 0, 1);
                document.getElementById('historyDateFrom').valueAsDate = firstDay;
                document.getElementById('historyDateTo').valueAsDate = today;
            }

            switchTab(tabName) {
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

                document.getElementById(tabName).classList.add('active');
                document.querySelector(`[onclick="app.switchTab('${tabName}')"]`).classList.add('active');

                this.currentTab = tabName;

                if (tabName === 'inventory') this.filterInventory();
                else if (tabName === 'expiry') this.filterExpiry();
                else if (tabName === 'history') this.filterHistory();
            }

            async loadData() {
                const transaction = this.db.transaction(['items', 'history'], 'readonly');
                this.items = await this.getAll(transaction.objectStore('items'));
                this.history = await this.getAll(transaction.objectStore('history'));
            }

            getAll(objectStore) {
                return new Promise((resolve, reject) => {
                    const request = objectStore.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async saveItem(item) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['items'], 'readwrite');
                    const request = transaction.objectStore('items').put(item);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async saveHistory(entry) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['history'], 'readwrite');
                    const request = transaction.objectStore('history').add(entry);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async deleteAllItems() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['items'], 'readwrite');
                    const request = transaction.objectStore('items').clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            formatDate(yymmdd) {
                if (!yymmdd) return '';
                const str = String(yymmdd).padStart(6, '0');
                const yy = parseInt(str.substring(0, 2));
                const mm = parseInt(str.substring(2, 4));
                const dd = parseInt(str.substring(4, 6));

                if (mm < 1 || mm > 12 || dd < 1 || dd > 31) {
                    return `20${yy}年${mm}月`;
                }

                const year = 2000 + yy;
                const date = new Date(year, mm - 1, dd);
                return date.toLocaleDateString('ja-JP');
            }

            getExpiryStatus(yymmdd) {
                if (!yymmdd) return 'unknown';

                const str = String(yymmdd).padStart(6, '0');
                const yy = parseInt(str.substring(0, 2));
                const mm = parseInt(str.substring(2, 4));
                const dd = parseInt(str.substring(4, 6));

                if (mm < 1 || mm > 12) return 'unknown';

                const year = 2000 + yy;
                let expiryDate;

                if (dd < 1 || dd > 31) {
                    expiryDate = new Date(year, mm, 0);
                } else {
                    expiryDate = new Date(year, mm - 1, dd);
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                expiryDate.setHours(0, 0, 0, 0);

                const daysUntilExpiry = Math.floor((expiryDate - today) / (1000 * 60 * 60 * 24));

                if (daysUntilExpiry < 0) return 'expired';
                if (daysUntilExpiry <= 30) return 'expiring-soon';
                if (daysUntilExpiry <= 90) return 'warning';
                return 'ok';
            }

            getExpiryStatusLabel(status) {
                const labels = {
                    'expired': { text: '期限切れ', class: 'expired' },
                    'expiring-soon': { text: '30日以内', class: 'expiring-soon' },
                    'warning': { text: '90日以内', class: 'warning' },
                    'ok': { text: '正常', class: 'ok' },
                    'unknown': { text: '不明', class: 'ok' }
                };
                return labels[status] || labels['ok'];
            }

            updateDashboard() {
                const expired = this.items.filter(item => {
                    return this.getExpiryStatus(item['入庫後最新使用期限(日付)']) === 'expired';
                }).length;

                const expiringSoon = this.items.filter(item => {
                    return this.getExpiryStatus(item['入庫後最新使用期限(日付)']) === 'expiring-soon';
                }).length;

                const inStock = this.items.filter(item => item['在庫数'] > 0).length;

                document.getElementById('totalItems').textContent = this.items.length;
                document.getElementById('inStock').textContent = inStock;
                document.getElementById('expiringSoon').textContent = expiringSoon;
                document.getElementById('expired').textContent = expired;

                const recentActivity = this.history.slice(-10).reverse();
                const activityHtml = recentActivity.length > 0
                    ? recentActivity.map(entry => `
                        <div class="activity-item ${entry['入庫/出庫'] === '出庫' ? 'out' : ''}">
                            <div class="activity-icon">${entry['入庫/出庫'] === '出庫' ? '📤' : '📥'}</div>
                            <div class="activity-content">
                                <div class="activity-title">${entry['物品名']}</div>
                                <div class="activity-detail">数量: ${entry['数量']} | ${entry['入庫/出庫']}</div>
                                <div class="activity-detail">担当: ${entry['入出庫者'] || '未設定'}</div>
                                <div class="activity-time">${new Date(entry['入出庫日']).toLocaleString('ja-JP')}</div>
                            </div>
                        </div>
                    `).join('')
                    : '<div class="empty-state"><div class="empty-state-text">履歴がありません</div></div>';

                document.getElementById('recentActivity').innerHTML = activityHtml;
            }

            filterInventory() {
                const searchTerm = document.getElementById('inventorySearch').value.toLowerCase();
                const activeFilter = document.querySelector('#inventoryFilters .filter-btn.active').dataset.filter;
                const sortBy = document.getElementById('inventorySortBy').value;

                let filtered = this.items.filter(item => {
                    const matchesSearch = !searchTerm ||
                        item['物品名'].toLowerCase().includes(searchTerm) ||
                        item['メーカー'].toLowerCase().includes(searchTerm) ||
                        String(item['コード']).includes(searchTerm) ||
                        String(item['物品コード']).includes(searchTerm);

                    if (!matchesSearch) return false;

                    const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);

                    if (activeFilter === 'all') return true;
                    if (activeFilter === 'in-stock') return item['在庫数'] > 0;
                    if (activeFilter === 'expiring-30') return expiryStatus === 'expiring-soon';
                    if (activeFilter === 'expiring-90') return expiryStatus === 'warning' || expiryStatus === 'expiring-soon';

                    return true;
                });

                filtered.sort((a, b) => {
                    if (sortBy === 'name') return a['物品名'].localeCompare(b['物品名'], 'ja');
                    if (sortBy === 'stock') return b['在庫数'] - a['在庫数'];
                    if (sortBy === 'expiry') {
                        const aExp = a['入庫後最新使用期限(日付)'] || 999999;
                        const bExp = b['入庫後最新使用期限(日付)'] || 999999;
                        return aExp - bExp;
                    }
                    if (sortBy === 'code') return String(a['コード']).localeCompare(String(b['コード']));
                    return 0;
                });

                this.displayInventory(filtered);
            }

            displayInventory(items) {
                const html = items.length > 0
                    ? items.map(item => {
                        const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);
                        const statusLabel = this.getExpiryStatusLabel(expiryStatus);
                        const stockClass = item['在庫数'] === 0 ? 'stock-low' : item['在庫数'] < 5 ? 'stock-warning' : '';

                        return `
                            <div class="item-card ${stockClass}">
                                <div class="item-info">
                                    <div class="item-name">${item['物品名']}</div>
                                    <div class="item-detail">
                                        <small><strong>メーカー:</strong> ${item['メーカー']}</small>
                                        <small><strong>規格:</strong> ${item['規格']}</small>
                                        <small><strong>コード:</strong> ${item['コード']} / ${item['物品コード']}</small>
                                    </div>
                                    <span class="expiry-status ${statusLabel.class}">${statusLabel.text}</span>
                                    <div class="item-detail" style="margin-top: 4px;">
                                        期限: ${this.formatDate(item['入庫後最新使用期限(日付)'])}
                                    </div>
                                </div>
                                <div class="item-stock">
                                    <div class="stock-number">${item['在庫数']}</div>
                                    <div style="font-size: 12px; color: var(--text2);">個</div>
                                </div>
                            </div>
                        `;
                    }).join('')
                    : `<div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-title">該当する品目がありません</div>
                        <div class="empty-state-text">別の条件で検索してみてください</div>
                    </div>`;

                document.getElementById('inventoryList').innerHTML = html;
            }

            filterExpiry() {
                const activeFilter = document.querySelector('#expiryFilters .filter-btn.active').dataset.filter;

                let filtered = this.items.filter(item => {
                    if (item['在庫数'] === 0) return false;

                    const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);

                    if (activeFilter === 'all') return true;
                    if (activeFilter === 'expired') return expiryStatus === 'expired';
                    if (activeFilter === 'expiring-30') return expiryStatus === 'expiring-soon';
                    if (activeFilter === 'expiring-90') return expiryStatus === 'warning' || expiryStatus === 'expiring-soon';

                    return true;
                });

                filtered.sort((a, b) => {
                    const aExp = a['入庫後最新使用期限(日付)'] || 999999;
                    const bExp = b['入庫後最新使用期限(日付)'] || 999999;
                    return aExp - bExp;
                });

                this.displayExpiry(filtered);
            }

            displayExpiry(items) {
                const html = items.length > 0
                    ? items.map(item => {
                        const expiryStatus = this.getExpiryStatus(item['入庫後最新使用期限(日付)']);
                        const statusLabel = this.getExpiryStatusLabel(expiryStatus);

                        return `
                            <div class="item-card">
                                <div class="item-info">
                                    <div class="item-name">${item['物品名']}</div>
                                    <div class="item-detail">
                                        <small><strong>メーカー:</strong> ${item['メーカー']}</small>
                                        <small><strong>期限:</strong> ${this.formatDate(item['入庫後最新使用期限(日付)'])}</small>
                                    </div>
                                    <span class="expiry-status ${statusLabel.class}">${statusLabel.text}</span>
                                </div>
                                <div class="item-stock">
                                    <div class="stock-number">${item['在庫数']}</div>
                                    <div style="font-size: 12px; color: var(--text2);">個</div>
                                </div>
                            </div>
                        `;
                    }).join('')
                    : `<div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <div class="empty-state-title">期限切れ商品はありません</div>
                        <div class="empty-state-text">在庫が適切に管理されています</div>
                    </div>`;

                document.getElementById('expiryList').innerHTML = html;
            }

            processBarcodeInput(barcode) {
                const matched = this.items.find(item =>
                    String(item['コード']) === String(barcode) ||
                    String(item['物品コード']) === String(barcode)
                );

                if (matched) {
                    this.currentScanItem = matched;
                    this.displayScanResult(matched);
                    document.getElementById('transactionForm').style.display = 'flex';
                } else {
                    document.getElementById('scannerResult').innerHTML = `
                        <div class="card">
                            <div class="alert alert-error">
                                ⚠️ バーコード「${barcode}」に一致する品目が見つかりません
                            </div>
                        </div>
                    `;
                    document.getElementById('transactionForm').style.display = 'none';
                }
            }

            displayScanResult(item) {
                const html = `
                    <div class="matched-item-field">
                        <span class="matched-item-label">品目名:</span>
                        <span class="matched-item-value">${item['物品名']}</span>
                    </div>
                    <div class="matched-item-field">
                        <span class="matched-item-label">メーカー:</span>
                        <span class="matched-item-value">${item['メーカー']}</span>
                    </div>
                    <div class="matched-item-field">
                        <span class="matched-item-label">規格:</span>
                        <span class="matched-item-value">${item['規格']}</span>
                    </div>
                    <div class="matched-item-field">
                        <span class="matched-item-label">現在在庫:</span>
                        <span class="matched-item-value">${item['在庫数']} 個</span>
                    </div>
                    <div class="matched-item-field">
                        <span class="matched-item-label">コード:</span>
                        <span class="matched-item-value">${item['コード']}</span>
                    </div>
                `;

                document.getElementById('matchedItemDisplay').innerHTML = html;
            }

            setTransactionType(type) {
                this.currentTransactionType = type;
                const inBtn = document.getElementById('inButton');
                const outBtn = document.getElementById('outButton');

                if (type === '入庫') {
                    inBtn.style.background = 'var(--primary)';
                    inBtn.style.color = 'var(--surface)';
                    outBtn.style.background = 'var(--surface)';
                    outBtn.style.color = 'var(--text)';
                } else {
                    inBtn.style.background = 'var(--surface)';
                    inBtn.style.color = 'var(--text)';
                    outBtn.style.background = 'var(--red)';
                    outBtn.style.color = 'var(--surface)';
                }
            }

            async submitTransaction() {
                if (!this.currentScanItem) {
                    alert('品目が選択されていません');
                    return;
                }

                const person = document.getElementById('transactionPerson').value.trim();
                const quantity = parseInt(document.getElementById('transactionQuantity').value) || 0;
                const expiry = document.getElementById('transactionExpiry').value.trim();
                const lot = document.getElementById('transactionLot').value.trim();
                const comment = document.getElementById('transactionComment').value.trim();

                if (quantity <= 0) {
                    alert('数量を入力してください');
                    return;
                }

                if (!person) {
                    alert('担当者名を入力してください');
                    return;
                }

                if (this.currentTransactionType === '入庫') {
                    this.currentScanItem['在庫数'] += quantity;
                    if (expiry && !this.currentScanItem['入庫後最新使用期限(日付)']) {
                        this.currentScanItem['入庫後最新使用期限(日付)'] = parseInt(expiry);
                        this.currentScanItem['入庫後最新使用期限'] = this.formatDate(expiry);
                    }
                } else {
                    this.currentScanItem['在庫数'] = Math.max(0, this.currentScanItem['在庫数'] - quantity);
                }

                await this.saveItem(this.currentScanItem);

                const historyEntry = {
                    '入出庫日': new Date().toISOString(),
                    '入出庫者': person,
                    '物品コード': this.currentScanItem['物品コード'],
                    'メーカー': this.currentScanItem['メーカー'],
                    '物品名': this.currentScanItem['物品名'],
                    '使用期限': expiry,
                    'ロット番号': lot,
                    '規格': this.currentScanItem['規格'],
                    '数量': quantity,
                    '入庫/出庫': this.currentTransactionType,
                    'コメント': comment
                };

                await this.saveHistory(historyEntry);

                document.getElementById('scannerResult').innerHTML = `
                    <div class="card">
                        <div class="alert alert-success">
                            ✅ ${this.currentTransactionType}を登録しました
                        </div>
                    </div>
                `;

                setTimeout(() => this.resetTransaction(), 1500);

                await this.loadData();
                this.updateDashboard();
            }

            resetTransaction() {
                document.getElementById('barcodeInput').value = '';
                document.getElementById('transactionPerson').value = '';
                document.getElementById('transactionQuantity').value = '';
                document.getElementById('transactionExpiry').value = '';
                document.getElementById('transactionLot').value = '';
                document.getElementById('transactionComment').value = '';
                document.getElementById('scannerResult').innerHTML = '';
                document.getElementById('transactionForm').style.display = 'none';
                this.currentScanItem = null;
                this.setTransactionType('入庫');
            }

            startScanner() {
                const container = document.getElementById('scannerContainer');
                const video = document.getElementById('video');

                if (this.scannerActive) return;

                container.style.display = 'block';
                this.scannerActive = true;

                Quagga.init(
                    {
                        inputStream: {
                            name: 'Live',
                            type: 'LiveStream',
                            target: video,
                            constraints: { facingMode: 'environment' }
                        },
                        decoder: {
                            readers: [
                                'code_128_reader', 'ean_reader', 'ean_8_reader',
                                'qr_reader', 'code_39_reader', 'code_39_vin_reader',
                                'codabar_reader', 'upc_reader', 'upc_e_reader', 'i2of5_reader'
                            ],
                            debug: { showCanvas: false, showPatternLabel: false, showLogs: false }
                        }
                    },
                    (err) => {
                        if (err) return;
                        Quagga.start();
                        Quagga.onDetected((result) => {
                            const code = result.codeResult.code;
                            this.processBarcodeInput(code);
                            this.stopScanner();
                        });
                    }
                );
            }

            stopScanner() {
                if (!this.scannerActive) return;
                try {
                    Quagga.stop();
                    Quagga.offDetected();
                } catch (e) {}
                document.getElementById('scannerContainer').style.display = 'none';
                this.scannerActive = false;
            }

            filterHistory() {
                const dateFrom = document.getElementById('historyDateFrom').valueAsDate;
                const dateTo = document.getElementById('historyDateTo').valueAsDate;
                const itemName = document.getElementById('historyItemName').value.toLowerCase();
                const type = document.getElementById('historyType').value;

                if (!dateFrom || !dateTo) {
                    alert('期間を設定してください');
                    return;
                }

                const filtered = this.history.filter(entry => {
                    const entryDate = new Date(entry['入出庫日']);
                    entryDate.setHours(0, 0, 0, 0);

                    return entryDate >= dateFrom &&
                        entryDate <= dateTo &&
                        (!itemName || entry['物品名'].toLowerCase().includes(itemName)) &&
                        (!type || entry['入庫/出庫'] === type);
                });

                this.displayHistory(filtered);
            }

            displayHistory(entries) {
                const html = entries.length > 0
                    ? `<table class="table">
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>品目</th>
                                <th>種別</th>
                                <th>数量</th>
                                <th>担当者</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${entries.reverse().map(entry => `
                                <tr>
                                    <td>${new Date(entry['入出庫日']).toLocaleDateString('ja-JP')}</td>
                                    <td>${entry['物品名']}</td>
                                    <td><span class="badge-pill ${entry['入庫/出庫'] === '出庫' ? 'danger' : 'success'}">${entry['入庫/出庫']}</span></td>
                                    <td>${entry['数量']}</td>
                                    <td>${entry['入出庫者'] || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`
                    : `<div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-title">入出庫履歴がありません</div>
                    </div>`;

                document.getElementById('historyTable').innerHTML = html;
            }

            exportHistory() {
                const dateFrom = document.getElementById('historyDateFrom').valueAsDate;
                const dateTo = document.getElementById('historyDateTo').valueAsDate;
                const itemName = document.getElementById('historyItemName').value.toLowerCase();
                const type = document.getElementById('historyType').value;

                if (!dateFrom || !dateTo) {
                    alert('期間を設定してください');
                    return;
                }

                const filtered = this.history.filter(entry => {
                    const entryDate = new Date(entry['入出庫日']);
                    entryDate.setHours(0, 0, 0, 0);

                    return entryDate >= dateFrom &&
                        entryDate <= dateTo &&
                        (!itemName || entry['物品名'].toLowerCase().includes(itemName)) &&
                        (!type || entry['入庫/出庫'] === type);
                });

                if (filtered.length === 0) {
                    alert('エクスポート対象の記録がありません');
                    return;
                }

                const csv = this.convertToCSV(filtered);
                this.downloadCSV(csv, 'inventory-history.csv');
            }

            convertToCSV(data) {
                if (data.length === 0) return '';

                const headers = Object.keys(data[0]);
                const csv = [headers.map(h => `"${h}"`).join(',')];

                for (const row of data) {
                    const values = headers.map(header => {
                        let value = row[header];
                        if (value === null || value === undefined) value = '';
                        if (typeof value === 'string' && (value.includes(',') || value.includes('"') || value.includes('\n'))) {
                            return `"${value.replace(/"/g, '""')}"`;
                        }
                        return `"${value}"`;
                    });
                    csv.push(values.join(','));
                }

                return csv.join('\n');
            }

            downloadCSV(csv, filename) {
                const bom = '\uFEFF';
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            }

            async importData() {
                const fileInput = document.getElementById('importFile');
                const file = fileInput.files[0];

                if (!file) {
                    this.showAlert('importAlert', 'ファイルを選択してください', 'error');
                    return;
                }

                try {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array' });

                    await this.deleteAllItems();

                    const dbSheet = workbook.Sheets['データベース'];
                    if (dbSheet) {
                        const dbData = XLSX.utils.sheet_to_json(dbSheet);
                        for (const item of dbData) {
                            item['コード'] = String(item['コード']).padStart(6, '0');
                            item['物品コード'] = String(item['物品コード']).padStart(6, '0');
                            item['在庫数'] = parseInt(item['在庫数']) || 0;
                            if (item['入庫後最新使用期限(日付)']) {
                                item['入庫後最新使用期限(日付)'] = parseInt(item['入庫後最新使用期限(日付)']) || null;
                            }
                            item.id = item['コード'];
                            await this.saveItem(item);
                        }
                    }

                    await this.loadData();
                    this.updateDashboard();

                    this.showAlert('importAlert', `✅ ${this.items.length}件の品目をインポートしました`, 'success');

                    setTimeout(() => {
                        document.getElementById('importModal').classList.remove('active');
                        fileInput.value = '';
                    }, 1500);
                } catch (error) {
                    console.error('Import error:', error);
                    this.showAlert('importAlert', `❌ インポートエラー: ${error.message}`, 'error');
                }
            }

            async exportData() {
                try {
                    const wb = XLSX.utils.book_new();

                    const itemsWs = XLSX.utils.json_to_sheet(this.items);
                    XLSX.utils.book_append_sheet(wb, itemsWs, 'データベース');

                    const historyWs = XLSX.utils.json_to_sheet(this.history);
                    XLSX.utils.book_append_sheet(wb, historyWs, '入出庫履歴');

                    const timestamp = new Date().toISOString().split('T')[0];
                    XLSX.writeFile(wb, `inventory-${timestamp}.xlsx`);

                } catch (error) {
                    console.error('Export error:', error);
                    alert('エクスポートエラー: ' + error.message);
                }
            }

            showAlert(elementId, message, type) {
                const element = document.getElementById(elementId);
                element.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            }
        }

        const app = new InventoryApp();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,', { scope: '/' }).catch(() => {});
        }
    </script>
</body>
</html>
