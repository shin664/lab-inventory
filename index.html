            async submitTransaction() {
                if (!this.currentScanItem) {
                    alert('品目が選択されていません');
                    return;
                }

                const person = document.getElementById('transactionPerson').value.trim();
                const quantity = parseInt(document.getElementById('transactionQuantity').value) || 0;
                const expiry = document.getElementById('transactionExpiry').value.trim();
                const lot = document.getElementById('transactionLot').value.trim();
                const comment = document.getElementById('transactionComment').value.trim();

                if (quantity <= 0) {
                    alert('数量を入力してください');
                    return;
                }

                if (!person) {
                    alert('担当者名を入力してください');
                    return;
                }

                if (this.currentTransactionType === '入庫') {
                    this.currentScanItem['在庫数'] += quantity;
                    if (expiry && !this.currentScanItem['入庫後最新使用期限(日付)']) {
                        this.currentScanItem['入庫後最新使用期限(日付)'] = parseInt(expiry);
                        this.currentScanItem['入庫後最新使用期限'] = this.formatDate(expiry);
                    }
                } else {
                    this.currentScanItem['在庫数'] = Math.max(0, this.currentScanItem['在庫数'] - quantity);
                }

                await this.saveItem(this.currentScanItem);

                const historyEntry = {
                    '入出庫日': new Date().toISOString(),
                    '入出庫者': person,
                    '物品コード': this.currentScanItem['物品コード'],
                    'メーカー': this.currentScanItem['メーカー'],
                    '物品名': this.currentScanItem['物品名'],
                    '使用期限': expiry,
                    'ロット番号': lot,
                    '規格': this.currentScanItem['規格'],
                    '数量': quantity,
                    '入庫/出庫': this.currentTransactionType,
                    'コメント': comment
                };

                await this.saveHistory(historyEntry);

                document.getElementById('scannerResult').innerHTML = `
                    <div class="card">
                        <div class="alert alert-success">
                            ✅ ${this.currentTransactionType}を登録しました
                        </div>
                    </div>
                `;

                setTimeout(() => this.resetTransaction(), 1500);

                await this.loadData();
                this.updateDashboard();
            }

            resetTransaction() {
                document.getElementById('barcodeInput').value = '';
                document.getElementById('transactionPerson').value = '';
                document.getElementById('transactionQuantity').value = '';
                document.getElementById('transactionExpiry').value = '';
                document.getElementById('transactionLot').value = '';
                document.getElementById('transactionComment').value = '';
                document.getElementById('scannerResult').innerHTML = '';
                document.getElementById('transactionForm').style.display = 'none';
                this.currentScanItem = null;
                this.setTransactionType('入庫');
            }

            /* ===== Camera-based Scanner (getUserMedia direct) ===== */
            /* Android/iOS cross-platform compatible version */
            async _tryGetCamera() {
                // Strategy 1: High resolution with environment camera
                const constraints = [
                    {
                        audio: false,
                        video: {
                            facingMode: { ideal: 'environment' },
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 24, max: 30 }
                        }
                    },
                    // Strategy 2: Lower resolution fallback (some Android devices)
                    {
                        audio: false,
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    },
                    // Strategy 3: Minimal constraints (last resort)
                    {
                        audio: false,
                        video: {
                            facingMode: 'environment'
                        }
                    },
                    // Strategy 4: Any camera (front camera fallback)
                    {
                        audio: false,
                        video: true
                    }
                ];

                for (let i = 0; i < constraints.length; i++) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia(constraints[i]);
                        console.log(`Camera started with strategy ${i + 1}`);
                        return stream;
                    } catch (e) {
                        console.warn(`Camera strategy ${i + 1} failed:`, e.name, e.message);
                        if (i === constraints.length - 1) throw e;
                    }
                }
            }

            async startScanner() {
                if (this.scannerActive) return;
                const viewport = document.getElementById('scannerViewport');
                const video = document.getElementById('scanVideo');
                const camDot = document.getElementById('camDot');
                const camStatus = document.getElementById('camStatus');
                const scanFrame = document.getElementById('scanFrame');
                const debugEl = document.getElementById('scanDebug');
                debugEl.textContent = '';

                camStatus.textContent = 'カメラ起動中…';
                viewport.style.display = 'block';

                try {
                    // Check if getUserMedia is available
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('このブラウザはカメラに対応していません。Chrome/Safariをお使いください。');
                    }

                    // Check for HTTPS (required for camera on Android)
                    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                        throw new Error('カメラ使用にはHTTPS接続が必要です。');
                    }

                    this._stream = await this._tryGetCamera();

                    video.srcObject = this._stream;

                    // Android-specific: ensure video attributes are set
                    video.setAttribute('playsinline', '');
                    video.setAttribute('autoplay', '');
                    video.setAttribute('muted', '');
                    video.muted = true;

                    // Use a more robust play approach for Android
                    try {
                        await video.play();
                    } catch (playErr) {
                        console.warn('Auto-play failed, retrying:', playErr);
                        // Some Android browsers need a slight delay
                        await new Promise(r => setTimeout(r, 300));
                        await video.play();
                    }

                    // Wait for video to be ready with longer timeout for Android
                    await new Promise((resolve, reject) => {
                        if (video.videoWidth > 0) { resolve(); return; }
                        const onReady = () => {
                            video.removeEventListener('loadeddata', onReady);
                            video.removeEventListener('loadedmetadata', onReady);
                            resolve();
                        };
                        video.addEventListener('loadeddata', onReady);
                        video.addEventListener('loadedmetadata', onReady);
                        // Longer timeout for slower Android devices
                        setTimeout(() => {
                            video.removeEventListener('loadeddata', onReady);
                            video.removeEventListener('loadedmetadata', onReady);
                            if (video.videoWidth > 0) resolve();
                            else resolve(); // Proceed anyway, video may start shortly
                        }, 5000);
                    });

                    this._track = this._stream.getVideoTracks()[0] || null;
                    this.scannerActive = true;
                    this._torchOn = false;

                    scanFrame.style.display = 'block';
                    camDot.className = 'cam-dot active';
                    camStatus.textContent = 'スキャン中（1D + 2D）';

                    document.getElementById('btnScanStart').disabled = true;
                    document.getElementById('btnScanStop').disabled = false;

                    // Show torch button if supported
                    try {
                        const caps = this._track?.getCapabilities?.() || {};
                        if (caps.torch) {
                            document.getElementById('btnTorch').style.display = '';
                        }
                    } catch(e) { /* getCapabilities not supported on some browsers */ }

                    // Create scanning canvases
                    this._scanCanvas = document.createElement('canvas');
                    this._zxCanvas = document.createElement('canvas');

                    // Detect scan resolution based on device capability
                    const vw = video.videoWidth || 640;
                    const vh = video.videoHeight || 480;
                    // Cap scan resolution for performance on low-end Android
                    this._scanMaxW = Math.min(vw, 1280);
                    this._scanMaxH = Math.min(vh, 720);

                    // Setup ZXing reader
                    if (typeof ZXing !== 'undefined') {
                        const hints = new Map();
                        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                            ZXing.BarcodeFormat.CODE_128,
                            ZXing.BarcodeFormat.QR_CODE,
                            ZXing.BarcodeFormat.DATA_MATRIX,
                            ZXing.BarcodeFormat.EAN_13,
                            ZXing.BarcodeFormat.EAN_8,
                            ZXing.BarcodeFormat.PDF_417
                        ]);
                        this._zxReader = new ZXing.MultiFormatReader();
                        this._zxReader.setHints(hints);
                    }

                    // Start scan loops
                    this._quaggaRunning = true;
                    this._zxingRunning = true;
                    this._lastSeen = new Map();
                    this._q2Tick();
                    this._zxTick();

                    // Log device info for debugging
                    const ua = navigator.userAgent;
                    const isAndroid = /android/i.test(ua);
                    const isIOS = /iphone|ipad|ipod/i.test(ua);
                    console.log(`Scanner started: ${isAndroid ? 'Android' : isIOS ? 'iOS' : 'Other'}, resolution: ${video.videoWidth}x${video.videoHeight}`);

                } catch (e) {
                    console.error('Camera error:', e);
                    camDot.className = 'cam-dot error';
                    camStatus.textContent = '起動失敗';

                    // More helpful error messages
                    let errorMsg = '';
                    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
                        errorMsg = 'カメラの使用が許可されていません。ブラウザの設定でカメラ許可をしてください。\n\n【Android】設定 → アプリ → ブラウザ → 権限 → カメラを許可\n【iPhone】設定 → Safari → カメラを許可';
                    } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
                        errorMsg = 'カメラが見つかりません。カメラ付きデバイスでお試しください。';
                    } else if (e.name === 'NotReadableError' || e.name === 'TrackStartError') {
                        errorMsg = 'カメラが他のアプリで使用中か、ハードウェアエラーです。他のアプリを閉じて再試行してください。';
                    } else if (e.name === 'OverconstrainedError') {
                        errorMsg = 'カメラの設定に問題があります。再試行してください。';
                    } else if (e.message) {
                        errorMsg = e.message;
                    } else {
                        errorMsg = 'カメラ起動に失敗しました。HTTPS接続とカメラ許可を確認してください。';
                    }
                    debugEl.textContent = errorMsg;
                    viewport.style.display = 'block';
                }
            }

            _q2Tick() {
                if (!this._quaggaRunning || !this.scannerActive) return;
                const video = document.getElementById('scanVideo');
                const w = video.videoWidth, h = video.videoHeight;
                if (video.readyState < 2 || w === 0) {
                    this._q2Timer = setTimeout(() => this._q2Tick(), 300);
                    return;
                }
                // Use capped resolution for better Android performance
                const sw = Math.min(w, this._scanMaxW || 1280);
                const sh = Math.min(h, this._scanMaxH || 720);
                this._scanCanvas.width = sw;
                this._scanCanvas.height = sh;
                this._scanCanvas.getContext('2d').drawImage(video, 0, 0, sw, sh);
                const src = this._scanCanvas.toDataURL('image/jpeg', 0.75);

                let done = false;
                const guard = setTimeout(() => {
                    if (!done) { done = true; if (this._quaggaRunning && this.scannerActive) this._q2Timer = setTimeout(() => this._q2Tick(), 300); }
                }, 1500);

                if (typeof Quagga !== 'undefined' && typeof Quagga.decodeSingle === 'function') {
                    Quagga.decodeSingle({
                        decoder: { readers: ['code_128_reader', 'ean_reader', 'ean_8_reader', 'upc_reader', 'codabar_reader'], multiple: false },
                        locate: true,
                        locator: { patchSize: 'medium', halfSample: true },
                        numOfWorkers: 0,
                        src
                    }, result => {
                        if (done) return;
                        done = true;
                        clearTimeout(guard);
                        if (result?.codeResult?.code?.length >= 4) this._onScanDetected(result.codeResult.code);
                        if (this._quaggaRunning && this.scannerActive) this._q2Timer = setTimeout(() => this._q2Tick(), 280);
                    });
                } else {
                    done = true;
                    clearTimeout(guard);
                    if (this._quaggaRunning && this.scannerActive) this._q2Timer = setTimeout(() => this._q2Tick(), 500);
                }
            }

            _zxTick() {
                if (!this._zxingRunning || !this.scannerActive || !this._zxReader) return;
                const video = document.getElementById('scanVideo');
                const w = video.videoWidth, h = video.videoHeight;
                if (video.readyState >= 2 && w > 0) {
                    // Use capped resolution for better Android performance
                    const sw = Math.min(w, this._scanMaxW || 1280);
                    const sh = Math.min(h, this._scanMaxH || 720);
                    this._zxCanvas.width = sw;
                    this._zxCanvas.height = sh;
                    this._zxCanvas.getContext('2d').drawImage(video, 0, 0, sw, sh);
                    try {
                        const lum = new ZXing.HTMLCanvasElementLuminanceSource(this._zxCanvas);
                        const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
                        const result = this._zxReader.decode(bmp);
                        if (result) this._onScanDetected(result.getText());
                    } catch(e) {
                        // NotFoundException = no barcode, normal
                        // On some Android browsers, HTMLCanvasElementLuminanceSource may fail
                        if (e.name !== 'NotFoundException' && e.getKind?.() !== 'NotFoundException') {
                            // Try fallback using ImageData directly
                            try {
                                const ctx = this._zxCanvas.getContext('2d');
                                const imgData = ctx.getImageData(0, 0, sw, sh);
                                const lum = new ZXing.RGBLuminanceSource(imgData.data, sw, sh);
                                const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
                                const result = this._zxReader.decode(bmp);
                                if (result) this._onScanDetected(result.getText());
                            } catch(e2) { /* no barcode found or fallback also failed */ }
                        }
                    }
                }
                // Slightly longer interval on Android for better battery/performance
                const interval = /android/i.test(navigator.userAgent) ? 400 : 300;
                this._zxTimer = setTimeout(() => this._zxTick(), interval);
            }

            _onScanDetected(raw) {
                if (!raw) return;
                const now = Date.now();
                if (now - (this._lastSeen.get(raw) || 0) < 1200) return;
                this._lastSeen.set(raw, now);

                // Vibrate + beep
                if (navigator.vibrate) navigator.vibrate(30);
                this._playBeep();
            }

            _playBeep() {
                try {
                    // Reuse AudioContext for better performance (especially on Android)
                    if (!this._audioCtx || this._audioCtx.state === 'closed') {
                        this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    // Resume if suspended (iOS/Android autoplay policy)
                    if (this._audioCtx.state === 'suspended') {
                        this._audioCtx.resume();
                    }
                    const o = this._audioCtx.createOscillator();
                    const g = this._audioCtx.createGain();
                    o.frequency.value = 880;
                    g.gain.value = 0.02;
                    o.connect(g);
                    g.connect(this._audioCtx.destination);
                    o.start();
                    o.stop(this._audioCtx.currentTime + 0.08);
                } catch(e) { /* Audio not supported */ }

                // Parse GS1 if applicable
                const parsed = this._parseGS1(raw);
                const lookupCode = parsed.gtin || raw;

                document.getElementById('camStatus').textContent = '読み取りOK ✓ ' + lookupCode;

                // Try to match item
                this.processBarcodeInput(lookupCode);

                // Auto-fill expiry and lot if parsed from GS1
                if (parsed.exp) document.getElementById('transactionExpiry').value = parsed.exp;
                if (parsed.lot) document.getElementById('transactionLot').value = parsed.lot;
            }

            _parseGS1(rawInput) {
                const GS = String.fromCharCode(29);
                let s = (rawInput || '').trim();
                if (/^\]([Cc]1|[Ee]0)/.test(s)) s = s.slice(3);
                s = s.replace(/\(/g, '').replace(/\)/g, '');

                const out = { gtin: '', exp: '', lot: '' };
                let i = 0;
                while (i < s.length) {
                    if (s[i] === GS) { i++; continue; }
                    const a2 = s.slice(i, i+2);
                    if (a2 === '01') { const v = s.slice(i+2, i+16); if (/^\d{14}$/.test(v)) out.gtin = v; i += 16; continue; }
                    if (a2 === '17') { const v = s.slice(i+2, i+8); if (/^\d{6}$/.test(v)) out.exp = v; i += 8; continue; }
                    if (a2 === '10') {
                        const st = i+2, gp = s.indexOf(GS, st);
                        const en = gp !== -1 ? gp : Math.min(st+20, s.length);
                        out.lot = s.slice(st, en); i = en; continue;
                    }
                    if (a2 === '00') { i += 20; continue; }
                    if (a2 === '02') { i += 16; continue; }
                    if (['11','12','13','15','16','18','19','20'].includes(a2)) { i += 8; continue; }
                    if (a2 === '21') { const st=i+2, gp=s.indexOf(GS,st); i = gp!==-1?gp:Math.min(st+20,s.length); continue; }
                    if (/^3[1-6]/.test(a2)) { i += 10; continue; }
                    const ng = s.indexOf(GS, i);
                    if (ng !== -1) { i = ng; } else break;
                }
                return out;
            }

            async toggleTorch() {
                if (!this._track) return;
                const caps = this._track.getCapabilities?.();
                if (!caps?.torch) return;
                this._torchOn = !this._torchOn;
                await this._track.applyConstraints({ advanced: [{ torch: this._torchOn }] });
                document.getElementById('btnTorch').textContent = this._torchOn ? '🔦 OFF' : '🔦 ライト';
            }

            stopScanner() {
                this._quaggaRunning = false;
                this._zxingRunning = false;
                clearTimeout(this._q2Timer);
                clearTimeout(this._zxTimer);
                try { this._stream?.getTracks().forEach(t => t.stop()); } catch(e) {}
                this._stream = null;
                this._track = null;
                this._torchOn = false;

                const video = document.getElementById('scanVideo');
                if (video) video.srcObject = null;

                this.scannerActive = false;
                document.getElementById('scannerViewport').style.display = 'none';
                document.getElementById('scanFrame').style.display = 'none';
                document.getElementById('camDot').className = 'cam-dot';
                document.getElementById('camStatus').textContent = '待機中';
                document.getElementById('btnScanStart').disabled = false;
                document.getElementById('btnScanStop').disabled = true;
                document.getElementById('btnTorch').style.display = 'none';
            }

            manualLookup() {
                const v = document.getElementById('barcodeInput').value.trim();
                if (!v) return;
                this.processBarcodeInput(v);
            }

            openNewItemModal(editItem = null) {
                this._editingItem = editItem;
                const title = document.getElementById('newItemModalTitle');
                title.textContent = editItem ? '物品情報を編集' : '新規物品登録';
                document.getElementById('newItemAlert').innerHTML = '';

                if (editItem) {
                    document.getElementById('newItemCode').value = editItem['コード'] || '';
                    document.getElementById('newItemCode').readOnly = true;
                    document.getElementById('newItemCode').style.background = 'var(--surface2)';
                    document.getElementById('newItemProductCode').value = editItem['物品コード'] || '';
                    document.getElementById('newItemName').value = editItem['物品名'] || '';
                    document.getElementById('newItemMaker').value = editItem['メーカー'] || '';
                    document.getElementById('newItemSpec').value = editItem['規格'] || '';
                    document.getElementById('newItemStock').value = editItem['在庫数'] ?? 0;
                    document.getElementById('newItemExpiry').value = editItem['入庫後最新使用期限(日付)'] || '';
                } else {
                    document.getElementById('newItemCode').value = '';
                    document.getElementById('newItemCode').readOnly = false;
                    document.getElementById('newItemCode').style.background = '';
                    document.getElementById('newItemProductCode').value = '';
                    document.getElementById('newItemName').value = '';
                    document.getElementById('newItemMaker').value = '';
                    document.getElementById('newItemSpec').value = '';
                    document.getElementById('newItemStock').value = 0;
                    document.getElementById('newItemExpiry').value = '';
                }

                document.getElementById('newItemModal').classList.add('active');
                setTimeout(() => document.getElementById('newItemCode').focus(), 300);
            }

            closeNewItemModal() {
                document.getElementById('newItemModal').classList.remove('active');
                this._editingItem = null;
            }

            async saveNewItem() {
                const code = document.getElementById('newItemCode').value.trim().toUpperCase();
                const productCode = document.getElementById('newItemProductCode').value.trim();
                const name = document.getElementById('newItemName').value.trim();
                const maker = document.getElementById('newItemMaker').value.trim();
                const spec = document.getElementById('newItemSpec').value.trim();
                const stock = parseInt(document.getElementById('newItemStock').value) || 0;
                const expiryRaw = document.getElementById('newItemExpiry').value.trim();

                // Validation
                if (!code) {
                    this.showAlert('newItemAlert', 'コードを入力してください', 'error');
                    return;
                }
                if (!name) {
                    this.showAlert('newItemAlert', '物品名を入力してください', 'error');
                    return;
                }
                if (expiryRaw && !/^\d{6}$/.test(expiryRaw)) {
                    this.showAlert('newItemAlert', '使用期限はYYMMDD形式（6桁の数字）で入力してください', 'error');
                    return;
                }

                // Check duplicate code (新規のみ)
                if (!this._editingItem) {
                    const dup = this.items.find(i => String(i['コード']).toUpperCase() === code);
                    if (dup) {
                        this.showAlert('newItemAlert', `コード「${code}」はすでに登録されています`, 'error');
                        return;
                    }
                }

                const expiryNum = expiryRaw ? parseInt(expiryRaw) : null;
                const item = {
                    id: code,
                    'コード': code,
                    '物品コード': productCode,
                    'メーカー': maker,
                    '物品名': name,
                    '規格': spec,
                    '在庫数': stock,
                    '入庫後最新使用期限': expiryRaw ? this.formatDate(expiryRaw) : '',
                    '入庫後最新使用期限(日付)': expiryNum
                };

                try {
                    await this.saveItem(item);
                    await this.loadData();
                    this.updateDashboard();
                    this.filterInventory();

                    const msg = this._editingItem ? `「${name}」を更新しました` : `「${name}」を登録しました`;
                    this.showAlert('newItemAlert', `✅ ${msg}`, 'success');
                    setTimeout(() => this.closeNewItemModal(), 1200);
                } catch (e) {
                    this.showAlert('newItemAlert', `❌ 保存に失敗しました: ${e.message}`, 'error');
                }
            }

            filterHistory() {
                const dateFrom = document.getElementById('historyDateFrom').valueAsDate;
                const dateTo = document.getElementById('historyDateTo').valueAsDate;
                const itemName = document.getElementById('historyItemName').value.toLowerCase();
                const type = document.getElementById('historyType').value;

                if (!dateFrom || !dateTo) {
                    alert('期間を設定してください');
                    return;
                }

                const filtered = this.history.filter(entry => {
                    const entryDate = new Date(entry['入出庫日']);
                    entryDate.setHours(0, 0, 0, 0);

                    return entryDate >= dateFrom &&
                        entryDate <= dateTo &&
                        (!itemName || entry['物品名'].toLowerCase().includes(itemName)) &&
                        (!type || entry['入庫/出庫'] === type);
                });

                this.displayHistory(filtered);
            }

            displayHistory(entries) {
                const html = entries.length > 0
                    ? `<table class="table">
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>品目</th>
                                <th>種別</th>
                                <th>数量</th>
                                <th>担当者</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${entries.reverse().map(entry => `
                                <tr>
                                    <td>${new Date(entry['入出庫日']).toLocaleDateString('ja-JP')}</td>
                                    <td>${entry['物品名']}</td>
                                    <td><span class="badge-pill ${entry['入庫/出庫'] === '出庫' ? 'danger' : 'success'}">${entry['入庫/出庫']}</span></td>
                                    <td>${entry['数量']}</td>
                                    <td>${entry['入出庫者'] || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`
                    : `<div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-title">入出庫履歴がありません</div>
                    </div>`;

                document.getElementById('historyTable').innerHTML = html;
            }

            exportHistory() {
                const dateFrom = document.getElementById('historyDateFrom').valueAsDate;
                const dateTo = document.getElementById('historyDateTo').valueAsDate;
                const itemName = document.getElementById('historyItemName').value.toLowerCase();
                const type = document.getElementById('historyType').value;

                if (!dateFrom || !dateTo) {
                    alert('期間を設定してください');
                    return;
                }

                const filtered = this.history.filter(entry => {
                    const entryDate = new Date(entry['入出庫日']);
                    entryDate.setHours(0, 0, 0, 0);

                    return entryDate >= dateFrom &&
                        entryDate <= dateTo &&
                        (!itemName || entry['物品名'].toLowerCase().includes(itemName)) &&
                        (!type || entry['入庫/出庫'] === type);
                });

                if (filtered.length === 0) {
                    alert('エクスポート対象の記録がありません');
                    return;
                }

                const csv = this.convertToCSV(filtered);
                this.downloadCSV(csv, 'inventory-history.csv');
            }

            convertToCSV(data) {
                if (data.length === 0) return '';

                const headers = Object.keys(data[0]);
                const csv = [headers.map(h => `"${h}"`).join(',')];

                for (const row of data) {
                    const values = headers.map(header => {
                        let value = row[header];
                        if (value === null || value === undefined) value = '';
                        if (typeof value === 'string' && (value.includes(',') || value.includes('"') || value.includes('\n'))) {
                            return `"${value.replace(/"/g, '""')}"`;
                        }
                        return `"${value}"`;
                    });
                    csv.push(values.join(','));
                }

                return csv.join('\n');
            }

            downloadCSV(csv, filename) {
                const bom = '\uFEFF';
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);

                // iOS Safari compatible download
                const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
                if (isIOS && !('download' in document.createElement('a'))) {
                    // Fallback: open in new tab for iOS Safari < 13
                    window.open(url, '_blank');
                } else {
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }

            async importData() {
                const fileInput = document.getElementById('importFile');
                const file = fileInput.files[0];

                if (!file) {
                    this.showAlert('importAlert', 'ファイルを選択してください', 'error');
                    return;
                }

                try {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array' });

                    await this.deleteAllItems();

                    const dbSheet = workbook.Sheets['データベース'];
                    if (dbSheet) {
                        const dbData = XLSX.utils.sheet_to_json(dbSheet);
                        for (const item of dbData) {
                            item['コード'] = String(item['コード']).padStart(6, '0');
                            item['物品コード'] = String(item['物品コード']).padStart(6, '0');
                            item['在庫数'] = parseInt(item['在庫数']) || 0;
                            if (item['入庫後最新使用期限(日付)']) {
                                item['入庫後最新使用期限(日付)'] = parseInt(item['入庫後最新使用期限(日付)']) || null;
                            }
                            item.id = item['コード'];
                            await this.saveItem(item);
                        }
                    }

                    await this.loadData();
                    this.updateDashboard();

                    this.showAlert('importAlert', `✅ ${this.items.length}件の品目をインポートしました`, 'success');

                    setTimeout(() => {
                        document.getElementById('importModal').classList.remove('active');
                        fileInput.value = '';
                    }, 1500);
                } catch (error) {
                    console.error('Import error:', error);
                    this.showAlert('importAlert', `❌ インポートエラー: ${error.message}`, 'error');
                }
            }

            async exportData() {
                try {
                    const wb = XLSX.utils.book_new();

                    const itemsWs = XLSX.utils.json_to_sheet(this.items);
                    XLSX.utils.book_append_sheet(wb, itemsWs, 'データベース');

                    const historyWs = XLSX.utils.json_to_sheet(this.history);
                    XLSX.utils.book_append_sheet(wb, historyWs, '入出庫履歴');

                    const timestamp = new Date().toISOString().split('T')[0];
                    XLSX.writeFile(wb, `inventory-${timestamp}.xlsx`);

                } catch (error) {
                    console.error('Export error:', error);
                    alert('エクスポートエラー: ' + error.message);
                }
            }

            showAlert(elementId, message, type) {
                const element = document.getElementById(elementId);
                element.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            }
        }

        const app = new InventoryApp();

        // Handle page visibility changes (Android: camera disconnects in background)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && app.scannerActive) {
                // Page went to background - stop scanner to release camera
                app._wasScanning = true;
                app.stopScanner();
            } else if (!document.hidden && app._wasScanning) {
                // Page came back to foreground - restart scanner
                app._wasScanning = false;
                setTimeout(() => app.startScanner(), 500);
            }
        });

        // Handle Android Chrome tab switching / app switching
        window.addEventListener('focus', () => {
            if (app._wasScanning && !app.scannerActive) {
                app._wasScanning = false;
                setTimeout(() => app.startScanner(), 500);
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,', { scope: '/' }).catch(() => {});
        }
    </script>
</body>
</html>
