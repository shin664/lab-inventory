<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GS1スキャナ</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#111;
color:white;
}

video{
width:90%;
max-width:500px;
border-radius:10px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
}
</style>
</head>

<body>

<h2>検査室 GS1スキャナ</h2>

<video id="video"></video>

<br>

<button onclick="start()">カメラ開始</button>
<button onclick="downloadCSV()">CSVダウンロード</button>

<table id="table">
<tr>
<th>time</th>
<th>GTIN</th>
<th>EXP</th>
<th>LOT</th>
</tr>
</table>

<script>

let data=[];

function parseGS1(raw){

raw=raw.replace("]C1","");

let gtin="";
let exp="";
let lot="";

let i=0;

while(i<raw.length){

let ai=raw.substr(i,2);

if(ai=="01"){
gtin=raw.substr(i+2,14);
i+=16;
continue;
}

if(ai=="17"){
exp=raw.substr(i+2,6);
i+=8;
continue;
}

if(ai=="10"){
lot=raw.substr(i+2);
break;
}

i++;

}

return {gtin,exp,lot};

}

const codeReader = new ZXing.BrowserMultiFormatReader();

function start(){

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
}).then(stream=>{

video.srcObject=stream;

codeReader.decodeFromVideoElement(video,(result,err)=>{

if(result){

let raw=result.text;

let parsed=parseGS1(raw);

let now=new Date().toLocaleString();

data.push([now,parsed.gtin,parsed.exp,parsed.lot]);

let table=document.getElementById("table");

let row=table.insertRow();

row.insertCell(0).innerText=now;
row.insertCell(1).innerText=parsed.gtin;
row.insertCell(2).innerText=parsed.exp;
row.insertCell(3).innerText=parsed.lot;

}

});

});

}

function downloadCSV(){

let csv="time,gtin,exp,lot\n";

data.forEach(r=>{
csv+=r.join(",")+"\n";
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="scan.csv";

a.click();

}

</script>

</body>
</html>
